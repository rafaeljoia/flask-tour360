version: '3.8'

services:
  app:
    build: .
    container_name: bravia360
    restart: always
    volumes:
      - bravia360_uploads:/app/uploads
    labels:
      - traefik.enable=true
      - traefik.http.routers.bravia.rule=Host(`tour360.braviaglobal.com.br`)
      - traefik.http.routers.bravia.entrypoint=websecure
      - traefil.http.routers.bravia.tls.certresolver=letsencrypt
      - traefik.http.services.bravia.loadbalancer.server.port=5000

volumes:
  bravia360_uploads:
    driver: local
